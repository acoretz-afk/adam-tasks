<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Case Dashboard">
<title>⚖️ Case Dashboard</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --surface3: #2a2a45;
  --border: #2e2e50;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --text: #e8e8f0;
  --text2: #a0a0c0;
  --text3: #6060a0;
  --red: #e05c5c;
  --green: #4caf7d;
  --yellow: #f0a500;
  --filing-accent: #f97316;
  --filing-surface: #1e1510;
  --filing-border: #7c3010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── PASSWORD SCREEN ── */
#password-screen { display:none; position:fixed; inset:0; background:var(--bg); z-index:9999; align-items:center; justify-content:center; }
.pw-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:min(380px,90vw); text-align:center; }
.pw-box h2 { font-size:1.5rem; margin-bottom:8px; }
.pw-box p { color:var(--text2); margin-bottom:24px; font-size:.9rem; }
.pw-input { width:100%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:1rem; margin-bottom:12px; outline:none; }
.pw-input:focus { border-color:var(--accent); }
.pw-error { color:var(--red); font-size:.85rem; margin-bottom:12px; display:none; }
.pw-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; }
.pw-btn:hover { background:#7c73ff; }

/* ── SETUP SCREEN ── */
#setup-screen { display:none; position:fixed; inset:0; background:var(--bg); z-index:9998; align-items:center; justify-content:center; }
.setup-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:min(480px,90vw); }
.setup-box h2 { font-size:1.4rem; margin-bottom:8px; }
.setup-box p { color:var(--text2); margin-bottom:24px; font-size:.9rem; }
.setup-input { width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:.95rem; margin-bottom:12px; outline:none; font-family:inherit; }
.setup-input:focus { border-color:var(--accent); }
.setup-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:8px; }

/* ── APP SHELL ── */
#app { display:none; min-height:100vh; }
.top-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.top-bar-left { display:flex; align-items:center; gap:12px; }
.app-title { font-size:1.1rem; font-weight:700; color:var(--text); }
.date-display { font-size:.8rem; color:var(--text3); }
.top-bar-right { display:flex; align-items:center; gap:10px; }
.add-task-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-size:.9rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
.add-task-btn:hover { background:#7c73ff; }

/* ── ADD DROPDOWN ── */
.add-dropdown { position:relative; }
.add-menu { position:absolute; right:0; top:calc(100% + 6px); background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:6px; min-width:210px; z-index:200; display:none; flex-direction:column; gap:2px; box-shadow:0 8px 24px rgba(0,0,0,.4); }
.add-menu.open { display:flex; }
.add-menu-item { background:transparent; border:none; color:var(--text); padding:10px 14px; border-radius:8px; font-size:.9rem; cursor:pointer; text-align:left; font-family:inherit; display:flex; align-items:center; gap:10px; }
.add-menu-item:hover { background:var(--surface3); }
.add-menu-item .menu-icon { font-size:1rem; width:20px; text-align:center; }

/* ── TABS ── */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); background:var(--surface); padding:0 20px; overflow-x:auto; }
.tab { padding:12px 18px; font-size:.85rem; font-weight:500; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; }
.tab.active { color:var(--accent2); border-bottom-color:var(--accent2); }
.tab:hover:not(.active) { color:var(--text2); }

/* ── MAIN CONTENT ── */
.content { padding:20px; max-width:1400px; margin:0 auto; }

/* ── LAYOUTS ── */
.two-col { display:grid; grid-template-columns:1fr 300px; gap:20px; align-items:start; }
@media (max-width:900px) { .two-col { grid-template-columns:1fr; } }
.three-col { display:grid; grid-template-columns:1fr 280px 280px; gap:20px; align-items:start; }
@media (max-width:1200px) { .three-col { grid-template-columns:1fr 260px; } }
@media (max-width:900px) { .three-col { grid-template-columns:1fr; } }

/* ── BENEFITS PANEL ── */
.benefits-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; position:sticky; top:100px; }
.benefits-header { background:var(--surface2); padding:14px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
.benefits-header-icon { font-size:1.1rem; }
.benefits-header-title { font-size:.9rem; font-weight:700; color:#67e8f9; letter-spacing:.03em; text-transform:uppercase; }
.benefits-header-count { margin-left:auto; background:#0e3040; color:#67e8f9; font-size:.75rem; font-weight:600; padding:2px 8px; border-radius:10px; }
.benefits-list { padding:8px; }
.benefits-empty { padding:20px 16px; text-align:center; color:var(--text3); font-size:.85rem; }

/* ── FILINGS PANEL ── */
.filings-panel { background:var(--filing-surface); border:1px solid var(--filing-border); border-radius:14px; overflow:hidden; position:sticky; top:100px; }
.filings-header { background:#2a1500; padding:14px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--filing-border); }
.filings-header-icon { font-size:1.1rem; }
.filings-header-title { font-size:.9rem; font-weight:700; color:#fb923c; letter-spacing:.03em; text-transform:uppercase; }
.filings-header-count { margin-left:auto; background:#7c3010; color:#fb923c; font-size:.75rem; font-weight:600; padding:2px 8px; border-radius:10px; }
.filings-list { padding:8px; }
.filings-empty { padding:20px 16px; text-align:center; color:var(--text3); font-size:.85rem; }

/* ── SECTION HEADERS ── */
.section-header { display:flex; align-items:center; gap:10px; margin:0 0 12px; }
.section-title { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); }
.section-count { background:var(--surface3); color:var(--text3); font-size:.72rem; font-weight:600; padding:2px 8px; border-radius:10px; }

/* ── TASK CARD ── */
.task-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:8px;
  transition:all .15s;
  cursor:pointer;
  position:relative;
}
.task-card:hover { border-color:var(--accent); background:var(--surface2); }
.task-card.done-card { opacity:.55; }
.task-card.dragging { opacity:.4; border:2px dashed var(--accent); }
.task-card.drag-over { border-color:var(--accent2); background:var(--surface3); transform:translateY(-2px); }

/* Filing card variant */
.task-card.filing-card { background:#1c1208; border-color:#5a2808; border-radius:10px; }
.task-card.filing-card:hover { border-color:var(--filing-accent); background:#231508; }

.drag-handle {
  position:absolute; left:0; top:0; bottom:0; width:28px;
  display:flex; align-items:center; justify-content:center;
  color:var(--text3); font-size:.75rem; cursor:grab; border-radius:12px 0 0 12px;
  opacity:0; transition:opacity .15s;
}
.task-card:hover .drag-handle { opacity:1; }
.drag-handle:active { cursor:grabbing; }

.task-inner { padding:12px 12px 12px 28px; display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.task-notes-full { flex-basis:100%; margin-top:0; }
.task-left { flex:1; min-width:0; }
.task-type-badge { display:inline-flex; align-items:center; gap:4px; font-size:.72rem; font-weight:600; color:var(--text3); margin-bottom:4px; }
.task-title { font-size:.9rem; font-weight:500; line-height:1.35; }
.task-title.done-title { text-decoration:line-through; color:var(--text3); }
.task-meta { display:flex; flex-wrap:wrap; align-items:center; gap:4px; margin-top:5px; font-size:.78rem; }
.meta-client { color:var(--text2); font-weight:500; }
.meta-dot { color:var(--text3); }
.priority-badge { font-size:.7rem; font-weight:600; padding:2px 7px; border-radius:8px; }
.deadline-badge { font-weight:500; }
.hard-badge { font-size:.7rem; font-weight:700; color:#fb923c; }
.task-notes { margin-top:6px; font-size:.78rem; color:var(--text3); line-height:1.4; padding:6px 8px; background:var(--surface3); border-radius:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.subtasks-list { margin-top:8px; display:flex; flex-direction:column; gap:4px; }
.subtask-item { display:flex; align-items:flex-start; gap:6px; font-size:.78rem; color:var(--text2); }
.subtask-check { margin-top:1px; width:13px; height:13px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.subtask-text { line-height:1.3; }
.subtask-text.done-sub { text-decoration:line-through; color:var(--text3); }

.task-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.status-select {
  background:var(--surface3); border:1px solid var(--border); color:var(--text);
  font-size:.75rem; padding:4px 6px; border-radius:7px; cursor:pointer; outline:none;
  font-family:inherit;
}
.status-select:focus { border-color:var(--accent); }

/* ── MULTISTEP GROUP ── */
.multistep-group { margin-bottom:12px; }
.multistep-header { display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:10px 10px 0 0; margin-bottom:0; }
.multistep-label { font-size:.8rem; font-weight:600; color:var(--accent2); }
.multistep-count { margin-left:auto; font-size:.72rem; color:var(--text3); }
.multistep-group .task-card { border-radius:0; margin-bottom:1px; }
.multistep-group .task-card:last-child { border-radius:0 0 10px 10px; margin-bottom:0; }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:48px 20px; color:var(--text3); }
.empty-state .es-icon { font-size:2.5rem; margin-bottom:12px; }
.empty-state p { font-size:.9rem; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; align-items:flex-start; justify-content:center; padding:20px; overflow-y:auto; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:min(560px,100%); padding:28px; margin:auto; }
.modal-title { font-size:1.15rem; font-weight:700; margin-bottom:22px; }
.field-label { font-size:.8rem; font-weight:600; color:var(--text2); margin-bottom:6px; display:block; }
.field-row { margin-bottom:16px; }
.field-input, .field-select, .field-textarea {
  width:100%; padding:10px 13px; background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:.9rem; outline:none; font-family:inherit;
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color:var(--accent); }
.field-textarea { resize:vertical; min-height:70px; }
.field-select option { background:var(--surface2); }
.two-fields { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:480px) { .two-fields { grid-template-columns:1fr; } }
.checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.checkbox-row input { accent-color:var(--accent); width:15px; height:15px; }
.checkbox-row label { font-size:.88rem; color:var(--text2); cursor:pointer; }
.modal-actions { display:flex; gap:10px; margin-top:24px; }
.btn-save { flex:1; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:.95rem; font-weight:600; cursor:pointer; }
.btn-save:hover { background:#7c73ff; }
.btn-cancel { padding:11px 20px; background:var(--surface3); color:var(--text2); border:none; border-radius:10px; font-size:.95rem; cursor:pointer; }
.btn-cancel:hover { background:var(--border); }
.btn-delete { padding:11px 16px; background:transparent; color:var(--red); border:1px solid var(--red); border-radius:10px; font-size:.9rem; cursor:pointer; }
.btn-delete:hover { background:#3a1515; }

/* ── FILING DEADLINES (prominent) ── */
.filing-deadlines { display:flex; flex-direction:column; gap:4px; align-items:flex-end; margin-bottom:6px; }
.filing-dl-row { display:flex; align-items:center; gap:5px; justify-content:flex-end; }
.filing-dl-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#fb923c; flex-shrink:0; }
.filing-dl-value { font-size:.85rem; font-weight:700; }
.filing-dl-days { font-size:.72rem; font-weight:500; color:var(--text3); }

/* ── DRAFT DEADLINE FIELD (modal) ── */
#draft-deadline-row { display:none; }

/* ── HIDE DONE TOGGLE ── */
.hide-done-btn { background:var(--surface2); color:var(--text2); border:1px solid var(--border); border-radius:10px; padding:9px 14px; font-size:.85rem; font-weight:500; cursor:pointer; }
.hide-done-btn.active { color:var(--accent2); border-color:var(--accent2); }

/* ── CARD DELETE ── */
.card-delete-btn { background:transparent; border:none; color:var(--text3); cursor:pointer; font-size:.9rem; padding:3px 5px; border-radius:5px; opacity:0; transition:opacity .15s, color .15s; line-height:1; }
.task-card:hover .card-delete-btn { opacity:1; }
.card-delete-btn:hover { color:var(--red); }

/* Subtask editor */
.subtask-editor { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
.subtask-edit-row { display:flex; gap:6px; align-items:center; }
.subtask-edit-input { flex:1; padding:8px 11px; background:var(--surface3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.85rem; outline:none; font-family:inherit; }
.subtask-edit-input:focus { border-color:var(--accent); }
.subtask-remove-btn { background:transparent; border:none; color:var(--red); cursor:pointer; font-size:1rem; padding:0 4px; flex-shrink:0; }
.add-subtask-btn { background:transparent; border:1px dashed var(--border); color:var(--text3); border-radius:8px; padding:7px 12px; font-size:.82rem; cursor:pointer; width:100%; text-align:left; }
.add-subtask-btn:hover { border-color:var(--accent); color:var(--accent2); }

/* ── CLIENT VIEW ── */
.client-group { margin-bottom:24px; }
.client-group-header { font-size:.88rem; font-weight:700; color:var(--text2); padding:8px 12px; background:var(--surface2); border-radius:8px 8px 0 0; border:1px solid var(--border); border-bottom:none; display:flex; align-items:center; gap:8px; }
.client-group-tasks { border:1px solid var(--border); border-radius:0 0 8px 8px; overflow:hidden; }
.client-group-tasks .task-card { border-radius:0; border:none; border-bottom:1px solid var(--border); margin-bottom:0; }
.client-group-tasks .task-card:last-child { border-bottom:none; }
.client-apps { border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; padding:10px; }
.client-apps-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#67e8f9; margin-bottom:8px; }

/* ── APP CARDS ── */
.app-section { margin-bottom:10px; }
.app-section-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); padding:0 4px 4px; display:block; }
.app-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:5px; cursor:pointer; transition:all .15s; }
.app-card:hover { border-color:#67e8f9; background:var(--surface3); }
.app-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; margin-bottom:3px; }
.app-type-label { font-size:.72rem; font-weight:700; color:#67e8f9; }
.app-status-pill { font-size:.65rem; font-weight:600; padding:2px 7px; border-radius:8px; flex-shrink:0; }
.app-client-name { font-size:.82rem; color:var(--text); font-weight:500; }
.app-arrears { font-size:.82rem; font-weight:700; color:#67e8f9; margin-top:2px; }
.app-meta-row { font-size:.75rem; color:var(--text3); margin-top:2px; }
.app-warnings { display:flex; flex-direction:column; gap:2px; margin-top:5px; }
.app-warn { font-size:.7rem; font-weight:600; padding:2px 6px; border-radius:6px; }
.app-warn-yellow { color:#f0a500; background:rgba(240,165,0,.12); }
.app-warn-red { color:#e05c5c; background:rgba(224,92,92,.12); }

/* ── TOAST ── */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:10px; font-size:.85rem; z-index:9999; pointer-events:none; opacity:0; transition:opacity .2s; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;">
  <div class="pw-box">
    <div style="font-size:2rem;margin-bottom:10px">✅</div>
    <h2>Case Task Manager</h2>
    <p>Sign in to continue</p>
    <input id="login-email" type="email" class="pw-input" placeholder="Email">
    <input id="login-password" type="password" class="pw-input" placeholder="Password">
    <div id="login-error" class="pw-error"></div>
    <button id="login-submit" class="pw-btn">Sign In</button>
  </div>
</div>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-box">
    <h2>Connect to Supabase</h2>
    <p>Enter your Supabase credentials to get started.</p>
    <input id="setup-url" type="text" class="setup-input" placeholder="Project URL (https://xxx.supabase.co)">
    <input id="setup-key" type="text" class="setup-input" placeholder="Anon public key">
    <button id="setup-connect" class="setup-btn">Connect</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="app-title">⚖️ Case Dashboard</span>
      <span class="date-display" id="date-display"></span>
    </div>
    <div class="top-bar-right">
      <button class="hide-done-btn active" id="hide-done-btn">Show Done</button>
      <div class="add-dropdown">
        <button class="add-task-btn" id="add-btn">+ Add ▾</button>
        <div class="add-menu" id="add-menu">
          <button class="add-menu-item" id="add-task-item"><span class="menu-icon">📋</span> Task / Action</button>
          <button class="add-menu-item" id="add-filing-item"><span class="menu-icon">⚖️</span> Filing</button>
          <button class="add-menu-item" id="add-benefit-item"><span class="menu-icon">🏠</span> Benefit Application</button>
        </div>
      </div>
      <button class="btn-cancel" id="sign-out-btn" style="padding:9px 14px;font-size:.85rem;">Sign Out</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="all">Overview</div>
    <div class="tab" data-tab="client">By Client</div>
  </div>

  <div class="content">
    <div id="tab-content"></div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="field-row">
      <label class="field-label">Task Title *</label>
      <input id="f-title" type="text" class="field-input" placeholder="What needs to be done?">
    </div>
    <div class="two-fields">
      <div class="field-row">
        <label class="field-label">Task Type</label>
        <select id="f-type" class="field-select">
          <option>Client Call</option>
          <option>Client Email</option>
          <option>Agency/Nonprofit Call</option>
          <option>Answer</option>
          <option>Motion</option>
          <option>HP Petition</option>
          <option>OSC</option>
          <option>Other Filing</option>
          <option>Internal/Admin</option>
          <option>OPA Communication</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field-row">
        <label class="field-label">Priority</label>
        <select id="f-priority" class="field-select">
          <option>Urgent</option>
          <option selected>Normal</option>
          <option>High</option>
          <option>Low</option>
        </select>
      </div>
    </div>
    <div class="two-fields">
      <div class="field-row">
        <label class="field-label">Client (Last, First)</label>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const CREDS_KEY = "ctm_creds";

const TASK_TYPES = [
  "Client Call","Client Email","Agency/Nonprofit Call",
  "Answer","Motion","HP Petition","OSC","Other Filing",
  "Internal/Admin","OPA Communication","Other"
];
const FILING_TYPES = new Set(["Answer","Motion","HP Petition","OSC","Other Filing"]);

const STATUSES = ["To Do","In Progress","Waiting","Done"];

const PRIORITY_STYLE = {
  Urgent:  { bg:"#3a1020", color:"#f87171" },
  High:    { bg:"#2a1f08", color:"#fbbf24" },
  Normal:  { bg:"#1a1a2e", color:"#a0a0c0" },
  Low:     { bg:"#0e1e18", color:"#6ee7b7" },
};

const TYPE_ICON = {
  "Client Call":"📞","Client Email":"✉️","Agency/Nonprofit Call":"📋",
  "Answer":"📄","Motion":"⚖️","HP Petition":"📋","OSC":"📜","Other Filing":"📁",
  "Internal/Admin":"🗂️","OPA Communication":"📨","Other":"📌"
};

const APP_TYPES = ['One Shot Deal','FHEPS to Stay','FHEPS to Move','CityFHEPS to Stay','CityFHEPS to Move','Other'];
const APP_STATUSES = {
  'One Shot Deal': ['Needs to Apply','Application Submitted','Phone Interview Complete','App # Assigned','Advocacy Packet Submitted','Pending HRA','Approved','Declined'],
  'FHEPS to Stay': ['CA Application','Application Submitted','Pending','Approved','Declined'],
  'CityFHEPS to Stay': ['Referred to Homebase','Referred to APS','Application Submitted','Pending','Approved','Declined'],
  'FHEPS to Move': ['Referred to Homebase','Shopping Letter Active','Apartment Search','Apartment Found','Package Submitted','Inspection','Move-in Scheduled','Completed'],
  'CityFHEPS to Move': ['Referred to Homebase','Shopping Letter Active','Apartment Search','Apartment Found','Package Submitted','Inspection','Move-in Scheduled','Completed'],
  'Other': ['In Progress','Submitted','Pending','Approved','Declined'],
};
const HOMEBASE_TYPES = new Set(['CityFHEPS to Stay','FHEPS to Move','CityFHEPS to Move']);
const MOVE_TYPES = new Set(['FHEPS to Move','CityFHEPS to Move']);
const ARREARS_TYPES = new Set(['One Shot Deal','FHEPS to Stay','CityFHEPS to Stay']);
const RESOLVED_STATUSES = new Set(['Approved','Declined','Completed']);

const APP_STATUS_STYLE = s => {
  if (['Approved','Completed','Move-in Scheduled'].includes(s)) return {bg:'#0e1e18',color:'#4caf7d'};
  if (['Declined'].includes(s)) return {bg:'#3a1020',color:'#f87171'};
  if (['Pending HRA','Pending'].includes(s)) return {bg:'#2a1f08',color:'#fbbf24'};
  return {bg:'var(--surface3)',color:'var(--text3)'};
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let db = null;
let tasks = [];
let applications = [];
let currentTab = "all";
let editingId = null;
let editingAppId = null;
let dragSrcId = null;
let hideDone = true;

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
async function proceedAfterAuth() {
  const creds = getCredentials();
  if (!creds.url || !creds.key) {
    document.getElementById("setup-screen").style.display = "flex";
    return;
  }
  initSupabase(creds.url, creds.key);
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    showApp();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("login-email").focus();
  }
}

async function handleLogin() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const err = document.getElementById("login-error");
  err.style.display = "none";
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    err.textContent = "Invalid email or password.";
    err.style.display = "block";
    document.getElementById("login-password").value = "";
    document.getElementById("login-password").focus();
    return;
  }
  document.getElementById("login-screen").style.display = "none";
  showApp();
}

async function handleSignOut() {
  await db.auth.signOut();
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-email").focus();
}

// ═══════════════════════════════════════════════════
// CREDENTIALS
// ═══════════════════════════════════════════════════
function getCredentials() {
  try { return JSON.parse(localStorage.getItem(CREDS_KEY)) || {}; } catch(e) { return {}; }
}
function saveCredentials(url, key) {
  try { localStorage.setItem(CREDS_KEY, JSON.stringify({url, key})); } catch(e) {}
}

function handleConnect() {
  const url = document.getElementById("setup-url").value.trim();
  const key = document.getElementById("setup-key").value.trim();
  if (!url || !key) return alert("Please enter both fields.");
  saveCredentials(url, key);
  initSupabase(url, key);
  document.getElementById("setup-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-email").focus();
}

// ═══════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════
function initSupabase(url, key) {
  db = supabase.createClient(url, key);
}

async function loadTasks() {
  if (!db) return;
  const { data, error } = await db.from("tasks").select("*").order("sort_order", {ascending:true}).order("created_at", {ascending:true});
  if (error) { console.error(error); return; }
  tasks = data || [];
  renderCurrentTab();
}

async function saveTask(taskData, id) {
  if (!db) return;
  if (id) {
    // UPDATE existing task
    const { error } = await db.from("tasks").update(taskData).eq("id", id);
    if (error) { showToast("Error saving task"); console.error(error); return; }
    showToast("Task updated");
  } else {
    // INSERT new task
    const { error } = await db.from("tasks").insert([taskData]);
    if (error) { showToast("Error saving task"); console.error(error); return; }
    showToast("Task added");
  }
  await loadTasks();
}

async function deleteTask(id) {
  if (!db) return;
  await db.from("tasks").delete().eq("id", id);
  showToast("Task deleted");
  await loadTasks();
}

async function updateStatus(id, status) {
  if (!db) return;
  await db.from("tasks").update({ status, updated_at: new Date().toISOString() }).eq("id", id);
  const t = tasks.find(x => x.id === id);
  if (t) t.status = status;
  renderCurrentTab();
}

async function updateSortOrders(orderedIds) {
  if (!db) return;
  const updates = orderedIds.map((id, idx) => db.from("tasks").update({sort_order: idx}).eq("id", id));
  await Promise.all(updates);
}

async function toggleSubtask(taskId, subIdx, done) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  let subs = parseSubtasks(t.subtasks);
  subs[subIdx].done = done;
  const newVal = JSON.stringify(subs);
  await db.from("tasks").update({ subtasks: newVal }).eq("id", taskId);
  t.subtasks = newVal;
  renderCurrentTab();
}

// ═══════════════════════════════════════════════════
// APPLICATIONS CRUD
// ═══════════════════════════════════════════════════
async function loadApplications() {
  if (!db) return;
  const { data, error } = await db.from('applications').select('*').order('created_at', {ascending:true});
  if (error) { console.error(error); return; }
  applications = data || [];
  renderCurrentTab();
}

async function saveApplication(appData, id) {
  if (!db) return;
  if (id) {
    const { error } = await db.from('applications').update(appData).eq('id', id);
    if (error) { showToast('Error saving application'); return; }
    showToast('Application updated');
  } else {
    const { data, error } = await db.from('applications').insert([appData]).select();
    if (error) { showToast('Error saving application'); return; }
    showToast('Application added');
  }
  await loadApplications();
}

async function deleteApplication(id) {
  if (!db) return;
  await db.from('applications').delete().eq('id', id);
  showToast('Application deleted');
  await loadApplications();
}


// ═══════════════════════════════════════════════════
// DATES
// ═══════════════════════════════════════════════════
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function weekEnd() {
  const d = new Date();
  const day = d.getDay();
  const diff = 6 - day;
  d.setDate(d.getDate() + diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  return Math.round((d - now) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return "";
  const [y,m,d] = dateStr.split("-");
  return `${parseInt(m)}/${parseInt(d)}`;
}

function setDateDisplay() {
  const d = new Date();
  document.getElementById("date-display").textContent = d.toLocaleDateString("en-US", {weekday:"long", month:"long", day:"numeric"});
}

// ═══════════════════════════════════════════════════
// SUBTASKS
// ═══════════════════════════════════════════════════
function parseSubtasks(raw) {
  if (!raw) return [];
  try {
    const p = JSON.parse(raw);
    if (Array.isArray(p)) return p;
  } catch(e) {}
  // Legacy: plain text lines
  return raw.split("\n").filter(Boolean).map(t => ({text:t, done:false}));
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderCurrentTab() {
  renderTab(currentTab);
}

function renderTab(tab) {
  const el = document.getElementById("tab-content");

  if (tab === "client") {
    renderClientView(el);
    return;
  }

  // Filter tasks
  let filtered = [...tasks];
  if (hideDone) filtered = filtered.filter(t => t.status !== "Done");

  // Split into filings and regular
  const filings = filtered.filter(t => FILING_TYPES.has(t.type));
  const regular = filtered.filter(t => !FILING_TYPES.has(t.type));

  // Sort: incomplete first, then by deadline, then by sort_order
  const sortTasks = arr => arr.sort((a,b) => {
    if (a.status==="Done" && b.status!=="Done") return 1;
    if (a.status!=="Done" && b.status==="Done") return -1;
    return (a.sort_order||0) - (b.sort_order||0);
  });

  sortTasks(filings);
  sortTasks(regular);

  const filingsHtml = filings.length
    ? filings.map(t => renderTaskCard(t, true)).join("")
    : `<div class="filings-empty">No filings due</div>`;

  const regularHtml = regular.length
    ? regular.map(t => renderTaskCard(t, false)).join("")
    : `<div class="empty-state"><div class="es-icon">✅</div><p>No tasks here</p></div>`;

  el.innerHTML = `
    <div class="three-col">
      <div class="main-col">
        <div class="section-header">
          <span class="section-title">Tasks & Actions</span>
          <span class="section-count">${regular.filter(t=>t.status!=="Done").length} open</span>
        </div>
        <div id="task-list-regular" class="task-list">${regularHtml}</div>
      </div>
      <div class="filings-panel">
        <div class="filings-header">
          <span class="filings-header-icon">⚖️</span>
          <span class="filings-header-title">Filings & Motions</span>
          <span class="filings-header-count">${filings.filter(t=>t.status!=="Done").length} open</span>
        </div>
        <div id="task-list-filings" class="filings-list">${filingsHtml}</div>
      </div>
      ${(({count,body}) => `<div class="benefits-panel">
        <div class="benefits-header">
          <span class="benefits-header-icon">🏠</span>
          <span class="benefits-header-title">Benefit Applications</span>
          <span class="benefits-header-count">${count} open</span>
        </div>
        <div class="benefits-list">${body}</div>
      </div>`)(buildBenefitsPanelHtml())}
    </div>`;

  attachDragDrop("task-list-regular", regular);
  attachDragDrop("task-list-filings", filings);
  attachStatusHandlers();
}

function renderClientView(el) {
  const grouped = {};
  const clientTasks = hideDone ? tasks.filter(t => t.status !== "Done") : tasks;
  clientTasks.forEach(t => {
    const key = t.client || "__admin__";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });
  // Include clients who only have applications
  applications.forEach(a => {
    const key = a.client || "__admin__";
    if (!grouped[key]) grouped[key] = [];
  });

  const clients = Object.keys(grouped).filter(k=>k!=="__admin__").sort();
  if (grouped["__admin__"]) clients.push("__admin__");

  if (clients.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><p>No tasks yet</p></div>`;
    return;
  }

  el.innerHTML = clients.map(client => {
    const ts = grouped[client] || [];
    const label = client === "__admin__" ? "Admin / No Client" : client;
    const open = ts.filter(t=>t.status!=="Done").length;
    const clientApps = applications.filter(a => a.client === client && !RESOLVED_STATUSES.has(a.status));
    const appsHtml = clientApps.length ? `
      <div class="client-apps">
        <div class="client-apps-title">Benefit Applications</div>
        ${clientApps.map(renderAppCard).join('')}
      </div>` : '';
    return `<div class="client-group">
      <div class="client-group-header">
        👤 ${escHtml(label)}
        <span style="margin-left:auto;font-size:.75rem;color:var(--text3)">${open} open · ${ts.length} tasks${clientApps.length ? ` · ${clientApps.length} app${clientApps.length>1?'s':''}` : ''}</span>
      </div>
      ${ts.length ? `<div class="client-group-tasks">${ts.map(t => renderTaskCard(t, FILING_TYPES.has(t.type))).join("")}</div>` : ''}
      ${appsHtml}
    </div>`;
  }).join("");

  attachStatusHandlers();
}

function renderAppCard(app) {
  const typeLabel = (app.type === 'Other' && app.other_type) ? `Other – ${app.other_type}` : app.type;
  const st = APP_STATUS_STYLE(app.status);
  const shoppingDays = daysUntil(app.shopping_letter_expiry);
  const vacateDays = daysUntil(app.vacate_date);
  const deadlineDays = daysUntil(app.deadline);
  const warnings = [];
  if (shoppingDays !== null && shoppingDays <= 30) {
    const cls = shoppingDays <= 0 ? 'app-warn-red' : 'app-warn-yellow';
    warnings.push(`<span class="app-warn ${cls}">🔔 Shopping letter ${shoppingDays <= 0 ? 'EXPIRED' : `expires in ${shoppingDays}d`}</span>`);
  }
  if (vacateDays !== null && vacateDays <= 14) {
    const cls = vacateDays <= 0 ? 'app-warn-red' : 'app-warn-yellow';
    warnings.push(`<span class="app-warn ${cls}">⚠️ Vacate: ${fmtDate(app.vacate_date)}${vacateDays > 0 ? ` · ${vacateDays}d` : ' · passed'}</span>`);
  }
  if (deadlineDays !== null && deadlineDays <= 14) {
    const cls = deadlineDays <= 0 ? 'app-warn-red' : 'app-warn-yellow';
    warnings.push(`<span class="app-warn ${cls}">⚠️ Pay-by: ${fmtDate(app.deadline)}${deadlineDays > 0 ? ` · ${deadlineDays}d` : ' · overdue'}</span>`);
  }
  const metaParts = [];
  if (app.paralegal) metaParts.push(`👤 ${escHtml(app.paralegal)}`);
  if (app.homebase_caseworker) metaParts.push(`🏢 ${escHtml(app.homebase_caseworker)}`);
  if (app.shopping_letter_expiry && shoppingDays > 30) metaParts.push(`🔔 Letter exp. ${fmtDate(app.shopping_letter_expiry)}`);
  if (app.vacate_date && vacateDays > 14) metaParts.push(`📦 Vacate ${fmtDate(app.vacate_date)}`);
  if (app.deadline && deadlineDays > 14) metaParts.push(`📅 Pay-by ${fmtDate(app.deadline)}`);
  return `<div class="app-card" onclick="openEditAppModal('${app.id}')">
    <div class="app-card-header">
      <span class="app-type-label">${escHtml(typeLabel)}</span>
      <span class="app-status-pill" style="background:${st.bg};color:${st.color}">${escHtml(app.status)}</span>
    </div>
    <div class="app-client-name">👤 ${escHtml(app.client)}</div>
    ${app.arrears ? `<div class="app-arrears">$${Number(app.arrears).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>` : ''}
    ${metaParts.length ? `<div class="app-meta-row">${metaParts.join(' · ')}</div>` : ''}
    ${warnings.length ? `<div class="app-warnings">${warnings.join('')}</div>` : ''}
  </div>`;
}

function buildBenefitsPanelHtml() {
  const active = applications.filter(a => !RESOLVED_STATUSES.has(a.status));
  const ACTION_EARLY = {
    'One Shot Deal': ['Needs to Apply','Application Submitted','Phone Interview Complete','App # Assigned','Advocacy Packet Submitted'],
    'FHEPS to Stay': ['CA Application','Application Submitted'],
    'CityFHEPS to Stay': ['Referred to Homebase','Application Submitted'],
    'FHEPS to Move': ['Referred to Homebase'],
    'CityFHEPS to Move': ['Referred to Homebase'],
    'Other': ['In Progress','Submitted'],
  };
  const actionNeeded = active.filter(a => (ACTION_EARLY[a.type]||[]).includes(a.status));
  const pending = active.filter(a => ['Pending','Pending HRA'].includes(a.status));
  const housingSearch = active.filter(a => MOVE_TYPES.has(a.type) && !['Referred to Homebase'].includes(a.status));

  const section = (label, apps) => apps.length ? `
    <div class="app-section">
      <span class="app-section-label">${label}</span>
      ${apps.map(renderAppCard).join('')}
    </div>` : '';

  const body = [
    section('🔴 Action Needed', actionNeeded),
    section('⏳ Pending Decision', pending),
    section('🏠 Housing Search', housingSearch),
  ].join('') || '<div class="benefits-empty">No active applications</div>';

  return { count: active.length, body };
}

function renderTaskCard(t, isFiling) {
  const p = PRIORITY_STYLE[t.priority] || PRIORITY_STYLE.Normal;

  // For filing cards, build prominent deadline block instead of inline badge
  function dlClass(days) {
    if (days === null) return "ok";
    if (days < 0) return "overdue";
    if (days <= 3) return "soon";
    return "ok";
  }
  function dlLabel(days) {
    if (days === null) return "";
    if (days < 0) return `${Math.abs(days)}d overdue`;
    if (days === 0) return "Today";
    if (days === 1) return "Tomorrow";
    return `${days}d`;
  }

  let deadlineHtml = "";
  let filingDeadlinesHtml = "";

  if (isFiling) {
    const filingDays = daysUntil(t.deadline);
    const draftDays = daysUntil(t.draft_deadline);
    const rows = [];
    if (t.draft_deadline) {
      rows.push(`<div class="filing-dl-row">
        <span class="filing-dl-label">Draft</span>
        <span class="filing-dl-value" style="color:#f0a500">${fmtDate(t.draft_deadline)}</span>
        ${draftDays !== null ? `<span class="filing-dl-days">${dlLabel(draftDays)}</span>` : ""}
      </div>`);
    }
    if (t.deadline) {
      rows.push(`<div class="filing-dl-row">
        <span class="filing-dl-label">${t.hard_deadline ? '🔒 Filing' : 'Filing'}</span>
        <span class="filing-dl-value" style="color:#e05c5c">${fmtDate(t.deadline)}</span>
        ${filingDays !== null ? `<span class="filing-dl-days">${dlLabel(filingDays)}</span>` : ""}
      </div>`);
    }
    if (rows.length) filingDeadlinesHtml = `<div class="filing-deadlines">${rows.join("")}</div>`;
  } else {
    const days = daysUntil(t.deadline);
    if (t.deadline) {
      let color, label;
      if (days < 0)       { color = "#c0392b"; label = `${Math.abs(days)}d overdue`; }
      else if (days === 0){ color = "#c0392b"; label = "Today"; }
      else if (days === 1){ color = "#c07a00"; label = "Tomorrow"; }
      else if (days <= 3) { color = "#c07a00"; label = `${days}d`; }
      else                { color = "#5a5a7a"; label = `${days}d`; }
      deadlineHtml = `<span class="meta-dot">·</span>
        <span class="deadline-badge" style="color:${color}">
          ${t.hard_deadline ? '<span class="hard-badge">🔒</span> ' : ''}${fmtDate(t.deadline)} · ${label}
        </span>`;
    }
  }

  const clientHtml = t.client
    ? `<span class="meta-client">👤 ${escHtml(t.client)}</span><span class="meta-dot">·</span>`
    : `<span class="meta-client" style="color:#6060a0;font-style:italic">Admin</span><span class="meta-dot">·</span>`;

  const notesHtml = t.notes
    ? `<div class="task-notes${isFiling ? ' task-notes-full' : ''}">${escHtml(t.notes)}</div>`
    : "";

  const subs = parseSubtasks(t.subtasks);
  const subtasksHtml = subs.length
    ? `<div class="subtasks-list">${subs.map((s,i) => `
        <div class="subtask-item">
          <input type="checkbox" class="subtask-check" ${s.done?"checked":""} data-task-id="${t.id}" data-sub-idx="${i}">
          <span class="subtask-text ${s.done?"done-sub":""}">${escHtml(s.text)}</span>
        </div>`).join("")}</div>`
    : "";

  const done = t.status === "Done";
  const cardClass = `task-card${done?" done-card":""}${isFiling?" filing-card":""}`;

  return `<div class="${cardClass}" data-id="${t.id}" draggable="true">
    <div class="drag-handle" title="Drag to reorder">⠿</div>
    <div class="task-inner" onclick="openEditModal('${t.id}')">
      <div class="task-left">
        <div class="task-type-badge">${TYPE_ICON[t.type]||"📌"} ${escHtml(t.type)}</div>
        <div class="task-title ${done?"done-title":""}">${escHtml(t.title)}</div>
        <div class="task-meta">
          ${clientHtml}
          <span class="priority-badge" style="background:${p.bg};color:${p.color}">${t.priority}</span>
          ${deadlineHtml}
        </div>
        ${isFiling ? '' : notesHtml}
        ${subtasksHtml}
      </div>
      <div class="task-right" onclick="event.stopPropagation()">
        <select class="status-select" data-status-id="${t.id}">
          ${STATUSES.map(s=>`<option${t.status===s?" selected":""}>${s}</option>`).join("")}
        </select>
        ${filingDeadlinesHtml}
        <button class="card-delete-btn" onclick="quickDelete('${t.id}', event)" title="Delete task">✕</button>
      </div>
      ${isFiling ? notesHtml : ''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// DRAG AND DROP
// ═══════════════════════════════════════════════════
function attachDragDrop(listId, taskArray) {
  const list = document.getElementById(listId);
  if (!list) return;

  list.querySelectorAll(".task-card[draggable]").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrcId = card.dataset.id;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      list.querySelectorAll(".task-card").forEach(c => c.classList.remove("drag-over"));
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      list.querySelectorAll(".task-card").forEach(c => c.classList.remove("drag-over"));
      if (card.dataset.id !== dragSrcId) card.classList.add("drag-over");
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      if (!dragSrcId || card.dataset.id === dragSrcId) return;
      card.classList.remove("drag-over");

      // Reorder in the taskArray
      const srcIdx = taskArray.findIndex(t => t.id === dragSrcId);
      const tgtIdx = taskArray.findIndex(t => t.id === card.dataset.id);
      if (srcIdx === -1 || tgtIdx === -1) return;

      const [moved] = taskArray.splice(srcIdx, 1);
      taskArray.splice(tgtIdx, 0, moved);

      // Re-render this list immediately for responsiveness
      list.innerHTML = taskArray.map(t => renderTaskCard(t, FILING_TYPES.has(t.type))).join("");
      attachDragDrop(listId, taskArray);
      attachStatusHandlers();

      // Persist new sort orders
      await updateSortOrders(taskArray.map(t => t.id));
    });
  });
}

// ═══════════════════════════════════════════════════
// STATUS HANDLERS
// ═══════════════════════════════════════════════════
function attachStatusHandlers() {
  document.querySelectorAll(".status-select").forEach(sel => {
    sel.addEventListener("change", async e => {
      await updateStatus(e.target.dataset.statusId, e.target.value);
    });
  });
  document.querySelectorAll(".subtask-check").forEach(chk => {
    chk.addEventListener("change", async e => {
      const taskId = chk.dataset.taskId;
      const subIdx = parseInt(chk.dataset.subIdx);
      await toggleSubtask(taskId, subIdx, chk.checked);
    });
  });
}

// SUBTASK EDITOR
// ═══════════════════════════════════════════════════
function renderSubtaskEditor(subs) {
  const editor = document.getElementById("subtask-editor");
  editor.innerHTML = subs.map((s, i) => `
    <div class="subtask-edit-row" data-idx="${i}">
      <input type="text" class="subtask-edit-input" value="${escHtml(s.text)}" placeholder="Step ${i+1}...">
      <button type="button" class="subtask-remove-btn" onclick="removeSubtask(${i})">✕</button>
    </div>`).join("");
}

function addSubtask() {
  const editor = document.getElementById("subtask-editor");
  const rows = editor.querySelectorAll(".subtask-edit-row");
  const idx = rows.length;
  const row = document.createElement("div");
  row.className = "subtask-edit-row";
  row.dataset.idx = idx;
  row.innerHTML = `<input type="text" class="subtask-edit-input" placeholder="Step ${idx+1}...">
    <button type="button" class="subtask-remove-btn" onclick="removeSubtask(${idx})">✕</button>`;
  editor.appendChild(row);
  row.querySelector("input").focus();
}

function removeSubtask(idx) {
  const editor = document.getElementById("subtask-editor");
  const rows = editor.querySelectorAll(".subtask-edit-row");
  if (rows[idx]) rows[idx].remove();
  // Re-index remaining
  editor.querySelectorAll(".subtask-edit-row").forEach((row, i) => {
    row.dataset.idx = i;
    row.querySelector("input").placeholder = `Step ${i+1}...`;
    row.querySelector(".subtask-remove-btn").setAttribute("onclick", `removeSubtask(${i})`);
  });
}

function collectSubtasks() {
  const editor = document.getElementById("subtask-editor");
  const existing = editingId ? parseSubtasks(tasks.find(t=>t.id===editingId)?.subtasks) : [];
  const rows = editor.querySelectorAll(".subtask-edit-row");
  const subs = [];
  rows.forEach((row, i) => {
    const text = row.querySelector("input").value.trim();
    if (text) {
      const prevDone = existing[i]?.done || false;
      subs.push({ text, done: prevDone });
    }
  });
  return subs.length ? JSON.stringify(subs) : null;
}
